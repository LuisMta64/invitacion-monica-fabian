<div class="min-h-screen bg-amber-100/15 flex items-center justify-center">
  <!-- Tarjeta contenedora -->
  <div class="relative m-0 max-w-4xl w-full erflow-hidden font-serif text-slate-800 flex flex-col pt-12 px-6">

    <!-- ================= MANCHAS ÍNDIGO DE FONDO ================= -->
    <!-- Mancha superior izquierda -->
    <div class="absolute top-[-5%] left-[-10%] w-80 h-80 rounded-full bg-indigo-100/70 blur-3xl pointer-events-none z-0"></div>

    <!-- Mancha central derecha -->
    <div class="absolute top-[35%] right-[-15%] w-96 h-96 rounded-full bg-indigo-100/60 blur-3xl pointer-events-none z-0"></div>

    <!-- Mancha inferior izquierda -->
    <div class="absolute bottom-[-10%] right-[-5%] w-80 h-80 rounded-full bg-indigo-200/50 blur-3xl pointer-events-none z-0"></div>
    <!-- =========================================================== -->

    <!-- Encabezado -->
    <div class="relative z-10 flex flex-col items-center text-center pb-8">
      <h1 class="font-cursive text-6xl text-slate-600 leading-tight">
        Coleccionando Recuerdos
      </h1>

      <!-- Divisor con Corazón -->
      <div class="flex items-center w-28 justify-center gap-2 mt-2">
        <span class="h-px w-full bg-slate-200"></span>
        <span class="text-slate-400 text-xs">♥</span>
        <span class="h-px w-full bg-slate-200"></span>
      </div>
    </div>

    <!-- Contenedor del Collage de Fotos (Altura fija controlada para el solapamiento) -->
    <div class="relative z-10 w-full max-w-md mx-auto h-130 md:h-140 my-4">

      <!-- Foto 1 (Superior Izquierda) -->
      <div class="absolute top-2 left-2 w-[52%] bg-white p-3 pb-8 shadow-md border border-slate-100/80 -rotate-6 transition-transform hover:rotate-0 hover:z-30 duration-300 z-10">
        <div class="w-full aspect-4/5 bg-slate-100 overflow-hidden rounded-xs">
          <img
            src="assets/recuerdos/8.jpg"
            alt="Momento 1"
            class="w-full h-full object-cover"
          />
        </div>
      </div>

      <!-- Foto 2 (Superior Derecha) -->
      <div class="absolute top-12 right-2 w-[48%] bg-white p-3 pb-8 shadow-md border border-slate-100/80 rotate-6 transition-transform hover:rotate-0 hover:z-30 duration-300 z-10">
        <div class="w-full aspect-4/5 bg-slate-100 overflow-hidden rounded-xs">
          <img
            src="assets/recuerdos/2.JPG"
            alt="Momento 2"
            class="w-full h-full object-cover"
          />
        </div>
      </div>

      <!-- Foto 3 (Inferior Centro/Izquierda) -->
      <div class="absolute bottom-4 left-6 w-[56%] bg-white p-3 pb-8 shadow-lg border border-slate-100/80 -rotate-2 transition-transform hover:rotate-0 hover:z-30 duration-300 z-20">
        <div class="w-full aspect-4/5 bg-slate-100 overflow-hidden rounded-xs">
          <img
            src="assets/recuerdos/3.JPEG"
            alt="Momento 3"
            class="w-full h-full object-cover"
          />
        </div>
      </div>

      <!-- ================= HOJAS / DETALLES ABSOLUTOS INTERNOS ================= -->
      <!-- Hojas decorativas detrás del collage superior derecho -->
      <img
        src="assets/recuerdos/flores.png"
        alt="Decoración hojas superior"
        class="absolute top-0 right-10 w-40 h-auto pointer-events-none z-0 opacity-80"
      />

      <!-- Hojas decorativas intermedias en la zona inferior derecha -->
      <img
        src="assets/recuerdos/flores.png"
        alt="Decoración hojas inferior"
        class="absolute bottom-20 left-4 w-28 h-auto pointer-events-none z-0 opacity-80"
      />
      <!-- ====================================================================== -->

    </div>

    <div class="absolute -left-40 top-15 w-90 sm:w-44 z-60 pointer-events-none">
        <img src="assets/second-screen/flor.png" alt="Flores decorativas superiores" class="opacity-95 object-contain" />
      </div>
  </div>
</div>
