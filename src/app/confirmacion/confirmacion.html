<div class="min-h-screen bg-linear-to-tl  p-0 flex items-center justify-center">
  <!-- Tarjeta contenedora -->
  <div class="relative m-0 max-w-4xl w-full  shadow-lg overflow-hidden font-serif text-slate-800 flex flex-col py-16 px-6">

    <!-- ================= MANCHAS ÍNDIGO DE FONDO ================= -->
    <!-- Mancha superior izquierda -->
    <div class="absolute top-[-5%] left-[-10%] w-80 h-80 rounded-full bg-indigo-100/40 blur-3xl pointer-events-none z-0"></div>

    <!-- Mancha central derecha -->
    <div class="absolute top-[30%] right-[-15%] w-96 h-96 rounded-full bg-indigo-50/50 blur-3xl pointer-events-none z-0"></div>

    <!-- Mancha inferior izquierda -->
    <div class="absolute bottom-[-10%] left-[-5%] w-80 h-80 rounded-full bg-indigo-100/40 blur-3xl pointer-events-none z-0"></div>
    <!-- =========================================================== -->

    <!-- Icono de Sobre Abierto -->
    <div class="relative z-10 flex flex-col items-center text-center pb-4">
      <svg class="w-16 h-16 text-[#557395] mb-2" fill="none" stroke="currentColor" stroke-width="1.1" viewBox="0 0 24 24">
        <!-- Parte trasera del sobre -->
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8v11a1 1 0 01-1 1H4a1 1 0 01-1-1V8M21 8l-9 6-9-6M21 8a1 1 0 00-1-1h-4.5M3 8a1 1 0 011-1h4.5" />
        <!-- Carta que sobresale -->
        <path stroke-linecap="round" stroke-linejoin="round" d="M7 7V4.5a1 1 0 011-1h8a1 1 0 011 1V7" />
        <!-- Corazón dentro de la carta -->
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 5.8s-.3-.8-1-.8c-.7 0-1 .5-1 .9 0 .8 2 2.1 2 2.1s2-1.3 2-2.1c0-.4-.3-.9-1-.9-.5 0-1 .8-1 .8z" />
      </svg>

      <!-- Título de Confirmación -->
      <p class="text-xs uppercase tracking-widest text-slate-500 font-sans font-bold mb-1">
        Confirma Tu
      </p>
      <h1 class="font-cursive text-6xl text-slate-600 leading-none">
        asistencia
      </h1>

      <!-- Divisor con Corazón Hueco -->
      <div class="flex items-center w-28 justify-center gap-2 mt-4">
        <span class="h-px w-full bg-slate-200"></span>
        <span class="text-slate-400 text-xs font-sans">♡</span>
        <span class="h-px w-full bg-slate-200"></span>
      </div>
    </div>

    <!-- Cita de Agradecimiento -->
    <div class="relative z-10 max-w-sm mx-auto text-center px-4 mb-4">
      <p class="text-base text-slate-600 leading-relaxed font-serif">
        Tu presencia hará este día aún más especial. <span class="font-sans text-slate-400">♡</span>
      </p>
    </div>

    <!-- Sección Condicional: Pases o Entrada de Nombre Manual -->
    @if (invitado) {
      <!-- Vista de pases si se encontró al invitado -->
      <div class="relative z-10 flex flex-col items-center justify-center my-6">

        <!-- Bloque del Número y Hojas -->
        <div class="flex items-center justify-center gap-6">
          <!-- Rama izquierda -->
          <svg class="w-6 h-14 text-amber-600/50" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <path d="M12 22V6" stroke-linecap="round" />
            <path d="M12 18c-3-1-4-3-4-3s2-1 4 0M12 14c-3-1-4-3-4-3s2-1 4 0M12 10c-3-1-4-3-4-3s2-1 4 0" stroke-linecap="round"/>
            <path d="M12 16c3-1 4-3 4-3s-2-1-4 0M12 12c3-1 4-3 4-3s-2-1-4 0M12 8c3-1 4-3 4-3s-2-1-4 0" stroke-linecap="round"/>
          </svg>

          <!-- Número de pases -->
          <p class="text-8xl my-2 font-serif text-[#3e5975] leading-none select-none">
            {{ invitado.pases ?? 0 }}
          </p>

          <!-- Rama derecha -->
          <svg class="w-6 h-14 text-amber-600/50 scale-x-[-1]" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <path d="M12 22V6" stroke-linecap="round" />
            <path d="M12 18c-3-1-4-3-4-3s2-1 4 0M12 14c-3-1-4-3-4-3s2-1 4 0M12 10c-3-1-4-3-4-3s2-1 4 0" stroke-linecap="round"/>
            <path d="M12 16c3-1 4-3 4-3s-2-1-4 0M12 12c3-1 4-3 4-3s-2-1-4 0M12 8c3-1 4-3 4-3s-2-1-4 0" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- Textos de pases -->
        <p class="font-cursive text-4xl text-slate-500 -mt-2 leading-none">
          pases
        </p>
        <p class="text-xs uppercase tracking-[0.25em] text-slate-500 font-sans font-bold mt-2">
          Reservados
        </p>

        <!-- Divisor con Corazón Sólido -->
        <div class="flex items-center w-28 justify-center gap-2 mt-4">
          <span class="h-px w-full bg-slate-200"></span>
          <span class="text-slate-400 text-xs">♥</span>
          <span class="h-px w-full bg-slate-200"></span>
        </div>
      </div>
    } @else {
      <!-- Formulario manual con diseño similar si no hay ID o coincidencia -->
      <div class="relative z-10 flex flex-col items-center justify-center mb-6 w-full max-w-xs mx-auto">

        <div class="flex items-center justify-center gap-6">
          <!-- Rama izquierda -->
          <!-- <svg class="w-6 h-14 text-amber-600/50" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <path d="M12 22V6" stroke-linecap="round" />
            <path d="M12 18c-3-1-4-3-4-3s2-1 4 0M12 14c-3-1-4-3-4-3s2-1 4 0M12 10c-3-1-4-3-4-3s2-1 4 0" stroke-linecap="round"/>
            <path d="M12 16c3-1 4-3 4-3s-2-1-4 0M12 12c3-1 4-3 4-3s-2-1-4 0M12 8c3-1 4-3 4-3s-2-1-4 0" stroke-linecap="round"/>
          </svg> -->

          <!-- Número de pases -->
          <p class="text-8xl my-2 font-serif text-[#3e5975] leading-none select-none">
            {{ pasesIfNot ?? 1 }}
          </p>

          <!-- Rama derecha -->
          <!-- <svg class="w-6 h-14 text-amber-600/50 scale-x-[-1]" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
            <path d="M12 22V6" stroke-linecap="round" />
            <path d="M12 18c-3-1-4-3-4-3s2-1 4 0M12 14c-3-1-4-3-4-3s2-1 4 0M12 10c-3-1-4-3-4-3s2-1 4 0" stroke-linecap="round"/>
            <path d="M12 16c3-1 4-3 4-3s-2-1-4 0M12 12c3-1 4-3 4-3s-2-1-4 0M12 8c3-1 4-3 4-3s-2-1-4 0" stroke-linecap="round"/>
          </svg> -->
        </div>

        <!-- Textos de pases -->
        <p class="font-cursive text-4xl text-slate-500 -mt-2 leading-none">
          pases
        </p>
        <p class="text-xs uppercase tracking-[0.25em] text-slate-500 font-sans font-bold mt-2">
          Reservados
        </p>




        <label class="text-xs uppercase tracking-[0.2em] text-slate-500 font-sans font-bold my-3">
          Introduce tu nombre completo
        </label>
        <input
          type="text"
          [(ngModel)]="manualName"
          placeholder="Escribe tu nombre aquí"
          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#557395]/40 focus:border-transparent font-serif text-center text-slate-700 bg-white/60 backdrop-blur-xs placeholder-slate-400 transition-all shadow-xs"
        />

        <!-- Divisor con Corazón Sólido -->
        <div class="flex items-center w-28 justify-center gap-2 mt-6">
          <span class="h-px w-full bg-slate-200"></span>
          <span class="text-slate-400 text-xs">♥</span>
          <span class="h-px w-full bg-slate-200"></span>
        </div>
      </div>
    }

    <!-- Fecha límite y Botón -->
    <div class="relative z-10 flex flex-col items-center text-center mt-2 mb-8">
      <p class="text-sm text-slate-600 leading-relaxed font-serif max-w-xs mb-6">
        Por favor, confirma tu asistencia antes del <strong class="font-sans font-bold text-slate-700">15 de Agosto de 2026</strong>.
      </p>

      <!-- Botón de Confirmación -->
      <button
        (click)="onConfirm()"
        [disabled]="!invitado && !manualName.trim()"
        class="w-full max-w-xs bg-[#557395] hover:bg-[#435b77] text-white py-4 px-6 rounded-2xl flex flex-col items-center justify-center transition-colors shadow-sm cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span class="text-xs tracking-[0.18em] font-sans font-bold uppercase">
          Confirmar Asistencia
        </span>
        <!-- Lineas divisoras internas con corazón -->
        <div class="flex items-center w-16 justify-center gap-1.5 mt-1.5">
          <span class="h-px w-full bg-white/30"></span>
          <span class="text-white/60 text-[9px] leading-none">♥</span>
          <span class="h-px w-full bg-white/30"></span>
        </div>
      </button>
    </div>

    <!-- ================= ELEMENTOS FLORALES ================= -->
    <!-- Flor superior izquierda -->
    <img
      src="assets/second-screen/flor.png"
      alt="Decoración floral superior"
      style="transform: rotate(-20deg);"
      class="absolute -top-16 -left-32 w-86 h-auto pointer-events-none z-10 opacity-90"
    />

    <!-- Flor inferior derecha -->
    <img
      src="assets/second-screen/flor.png"
      alt="Decoración floral inferior"
      style="transform: rotate(180deg);"
      class="absolute -bottom-22 -right-26 w-80 h-auto pointer-events-none z-10 opacity-90"
    />
    <!-- ====================================================== -->

  </div>
</div>
